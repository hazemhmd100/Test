<!doctype html>
<html lang="ar" dir="rtl">
<head>

  <style>
    html { background: #f3f0e8; }
    html[data-theme="dark"] { background: #171b16; }

  <script>
    try {
      if (localStorage.getItem("sales-manager-theme") === "dark") {
        document.documentElement.dataset.theme = "dark";
      }
    } catch (error) {}
  </script>
  <title>فتح النظام</title>

        <p class="eyebrow">نظام المبيعات</p>

      </div>
      <a class="button-link" href="index.html">فتح الصفحة الرئيسية</a>
    </section>

</body>
</html>
